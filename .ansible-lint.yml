---
# .ansible-lint.yml

# https://ansible.readthedocs.io/projects/lint/configuring/#ansible-lint-configuration

project_dir: .

profile: moderate

skip_list:
  - yaml[line-length]
  - meta-incorrect         # auto-generated role skeleton metadata
  - schema[meta]           # min_ansible_version type from skeleton
  - name[prefix]           # task name prefix convention doesn't fit our style
  - name[template]         # we use Jinja in task names for clarity in logs
  - var-naming[no-role-prefix]  # we use _ prefix for internal vars, not role prefix
  - ignore-errors          # intentional for optional imports
  - role-name              # nfs-common and vim-tiny use hyphens by convention

warn_list:
  - internal-error         # host/tasks/main.yml uses site_role_action from caller context

extra_vars:
  site_role_action: validate

exclude_paths:
  - .venv/
  - .ansible/
  - ansible/ansible.cfg
  - ansible/site.yml       # dynamic hosts: needs runtime hostvars — covered by make syntax
  - "**/tests/test.yml"    # auto-generated role test stubs

enable_list:
  - args
  - empty-string-compare
  - no-log-password
  - no-same-owner
  - yaml
