---
# https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/apt_key_module.html
 # https://docs.docker.com/engine/install/ubuntu/
 # https://docs.docker.com/engine/install/linux-postinstall
# - name: "Install package: {{ role_name }}"
#   ansible.builtin.apt:
#     name: "{{ role_name }}"
#     state: present
#     update_cache: true
###############################################################################################################################################################
- name: "Validate Keyring Directory Exists and is correct mode"
  ansible.builtin.file:
    path: "{{ docker_keyring_path_default }}"
    state: directory
    mode: "{{ docker_keyring_dir_mode_default }}"
- name: "Download Docker GPG key and drop it in keyrings"
  ansible.builtin.get_url:
    url: "{{ docker_ubuntu_asc_url }}"
    dest: "{{ docker_keyring_asc }}"
    mode: "{{ docker_file_mode_default }}"
- name: "Docker Repo Configuration"
  ansible.builtin.apt_repository:
    repo: "{{ docker_ubuntu_repo }}"
    mode: "{{ docker_file_mode_default }}"
    update_cache: true
    state: present
- name: "Install Default Docker Packages"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
- name: "Does 'docker' group exist"
  ansible.builtin.group:
    name: docker
    state: present
  register: docker_group
- name: "Add the current user to the 'docker' group"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
    state: present
  register: docker_user
- name: "Refresh the SSH session to apply new group membership"
  ansible.builtin.meta: refresh_inventory
  # ansible.builtin.meta: reset_connection
###############################################################################################################################################################
