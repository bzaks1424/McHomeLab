---
# Unified VM provisioning flow for all methods (ISO, PXE)
# https://docs.ansible.com/projects/ansible/latest/collections/community/vmware/vmware_guest_module.html
#
# Flow: Create VM (poweredoff) → Get MAC → Run host_provision role → Power on → Wait install → Cleanup
#

# 1. Create VM (always poweredoff — boot env must be ready before first boot)
- name: "Create new VM {{ inventory_hostname }}"
  delegate_to: localhost
  register: host_vm_create_result
  community.vmware.vmware_guest:
    hostname: "{{ vmware_vcenter_hostname }}"
    username: "{{ vmware_vcenter_username }}"
    password: "{{ vmware_vcenter_password }}"
    validate_certs: "{{ vmware_vcenter_validate_certs }}"
    ###########################################################################################################################################################
    name: "{{ inventory_hostname }}"
    state: poweredoff
    cluster: "{{ host_manager_infra.cluster }}"
    datacenter: "{{ host_manager_infra.datacenter }}"
    guest_id: "{{ host_manager_infra.guest_id }}"
    folder: "{{ host_manager_infra.folder }}"
    # --- HARDWARE CONFIGURATION ---
    hardware:
      memory_mb: "{{ host_ram_mb }}"
      num_cpus: "{{ host_cpus }}"
    # --- PRIMARY DISK CONFIGURATION ---
    disk: "{{ host_disks }}"
    # --- NETWORK CONFIGURATION ---
    networks: "{{ host_networks }}"

# 2. Get VM info (MAC address needed by PXE for MAC-specific iPXE script)
- name: "Get VM info for {{ inventory_hostname }}"
  delegate_to: localhost
  register: host_vm_info_post_create
  vmware.vmware.guest_info:
    hostname: "{{ vmware_vcenter_hostname }}"
    username: "{{ vmware_vcenter_username }}"
    password: "{{ vmware_vcenter_password }}"
    validate_certs: "{{ vmware_vcenter_validate_certs }}"
    name: "{{ inventory_hostname }}"

- name: "Set VM MAC address facts"
  ansible.builtin.set_fact:
    host_vm_mac: "{{ host_vm_info_post_create.guests[0].hw_eth0.macaddress }}"
    host_vm_mac_raw: "{{ host_vm_info_post_create.guests[0].hw_eth0.macaddress | replace(':', '') | upper }}"

# 3. Provision boot environment (method-specific)
#    ISO: builds custom ISO on controller, attaches to VM CD-ROM
#    PXE: templates iPXE script + autoinstall config, uploads to util
- name: "Provision boot environment for {{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: host_provision
  vars:
    host_provision_os: "{{ host_os }}"

# 3b. Push PXE boot files to PXE server via export system
#     pxe.yml staged files locally; now push them to util where netbootxyz serves them.
#     host_provision vars don't persist after include_role, so we inline registry lookups.
- name: "Push PXE boot files to PXE server"
  when: host_provision_method == 'pxe'
  ansible.builtin.include_role:
    name: registry
    tasks_from: export
  vars:
    _pxe_server: "{{ hostvars['localhost'].registry | registry_get('pxe_server') }}"
    _pxe_config_dir: "{{ hostvars['localhost'].registry | registry_get('pxe_config_dir') }}"
    _pxe_assets_dir: "{{ hostvars['localhost'].registry | registry_get('pxe_assets_dir') }}"
    _pxe_staging: "{{ export_root }}/pxe_staging/{{ inventory_hostname }}"
    _host_exports_override:
      - name: "pxe_ipxe_{{ inventory_hostname }}"
        type: file
        src: "{{ _pxe_staging }}/menus/MAC-{{ host_vm_mac | replace(':', '') }}.ipxe"
        dest: "{{ _pxe_server }}"
        dest_path: "{{ _pxe_config_dir }}/menus/MAC-{{ host_vm_mac | replace(':', '') }}.ipxe"
      - name: "pxe_userdata_{{ inventory_hostname }}"
        type: file
        src: "{{ _pxe_staging }}/autoinstall/user-data"
        dest: "{{ _pxe_server }}"
        dest_path: "{{ _pxe_assets_dir }}/autoinstall/{{ inventory_hostname }}/user-data"
      - name: "pxe_metadata_{{ inventory_hostname }}"
        type: file
        src: "{{ _pxe_staging }}/autoinstall/meta-data"
        dest: "{{ _pxe_server }}"
        dest_path: "{{ _pxe_assets_dir }}/autoinstall/{{ inventory_hostname }}/meta-data"

# 4. Power on VM (ISO boots from CD, PXE boots from network)
- name: "Power on VM {{ inventory_hostname }}"
  delegate_to: localhost
  community.vmware.vmware_guest:
    hostname: "{{ vmware_vcenter_hostname }}"
    username: "{{ vmware_vcenter_username }}"
    password: "{{ vmware_vcenter_password }}"
    validate_certs: "{{ vmware_vcenter_validate_certs }}"
    name: "{{ inventory_hostname }}"
    state: poweredon

# 5. Wait for install to complete (VM powers off via late-commands: poweroff)
- name: "Wait for install completion (poweroff) {{ inventory_hostname }}"
  delegate_to: localhost
  register: host_vm_info_install
  vmware.vmware.guest_info:
    hostname: "{{ vmware_vcenter_hostname }}"
    username: "{{ vmware_vcenter_username }}"
    password: "{{ vmware_vcenter_password }}"
    validate_certs: "{{ vmware_vcenter_validate_certs }}"
    name: "{{ inventory_hostname }}"
  until: host_vm_info_install.guests[0].hw_power_status == "poweredOff"
  delay: 60
  retries: 60

# 6. Cleanup boot environment (method-specific)
#    ISO: disconnects CD-ROM so next boot goes to disk
#    PXE: removes MAC-specific iPXE script so next boot goes to disk
- name: "Cleanup boot environment for {{ inventory_hostname }}"
  ansible.builtin.include_role:
    name: host_provision
    tasks_from: "cleanup_{{ host_provision_method }}"
###############################################################################################################################################################
