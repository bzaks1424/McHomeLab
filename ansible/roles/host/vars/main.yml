---
# vars file for host role
# Appliance hosts lack hardware/method/reprovision — defaults to "SHOULD_NOT_BE_HERE" so missing fields fail loudly
host_os: "{{ hostvars[inventory_hostname].provision.hardware.os | default('SHOULD_NOT_BE_HERE') }}"
host_fqdn: "{{ hostvars[inventory_hostname].provision.validate.host | default(hostvars[inventory_hostname].ansible_host) }}"
host_validate_port: "{{ hostvars[inventory_hostname].provision.validate.port | default('SHOULD_NOT_BE_HERE') }}"
host_provision_method: "{{ hostvars[inventory_hostname].provision.method | default('SHOULD_NOT_BE_HERE') }}"
host_should_reprovision: "{{ hostvars[inventory_hostname].provision.reprovision | default('SHOULD_NOT_BE_HERE') }}"
host_cpus: "{{ hostvars[inventory_hostname].provision.hardware.cpus | default('SHOULD_NOT_BE_HERE') }}"
host_ram_mb: "{{ hostvars[inventory_hostname].provision.hardware.ram_mb | default('SHOULD_NOT_BE_HERE') }}"
host_disks: "{{ hostvars[inventory_hostname].provision.hardware.disks | default('SHOULD_NOT_BE_HERE') }}"
host_networks: "{{ hostvars[inventory_hostname].provision.hardware.networks | default([]) | json_query('[].{name: name, device_type: type}') }}"
host_manager_infra: "{{ hostvars[inventory_hostname].provision.manager_infra | default('SHOULD_NOT_BE_HERE') }}"
host_nfs_mounts: "{{ hostvars[inventory_hostname].provision.mounts | default([]) | selectattr('type', 'eq', 'nfs') | list }}"
host_ssh_known_hosts_path: "{{ lookup('ansible.builtin.env', 'HOME') + '/.ssh/known_hosts' }}"
host_ssh_public_key_path: "{{ ansible_ssh_private_key_file }}.pub"
# Container provision type (used by configure_container_docker.yml)
host_docker_image: "{{ hostvars[inventory_hostname].provision.hardware.image | default('SHOULD_NOT_BE_HERE') }}"
host_docker_name: "{{ hostvars[inventory_hostname].provision.hardware.name | default('SHOULD_NOT_BE_HERE') }}"
host_docker_ports: "{{ hostvars[inventory_hostname].provision.hardware.ports | default('SHOULD_NOT_BE_HERE') }}"
host_docker_volumes: "{{ hostvars[inventory_hostname].provision.hardware.volumes | default('SHOULD_NOT_BE_HERE') }}"
# Appliance credentials — per-host override, falls back to global ansible creds
synology_user: "{{ hostvars[inventory_hostname].credentials.user | default(ansible_user) }}"
synology_password: "{{ hostvars[inventory_hostname].credentials.password | default(ansible_become_pass) }}"
synology_dsm_port: "{{ hostvars[inventory_hostname].provision.validate.port | default(host_synology_dsm_port) }}"
synology_cert_desc: "{{ hostvars[inventory_hostname].cert.desc | default(host_synology_cert_desc) }}"
synology_base_url: "https://{{ ansible_host }}:{{ synology_dsm_port }}"
