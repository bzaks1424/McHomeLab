---
- name: "Import OS Specific variables for {{ host_provision_os }}"
  ansible.builtin.include_vars:
    file: "{{ host_provision_os }}.yml"

- name: "Validate LVM size fits disk for {{ inventory_hostname }}"
  ansible.builtin.assert:
    that:
      - (host_provision_lvm_total_gb | int) <= (host_provision_lvm_available_gb | int)
    fail_msg: >-
      LVM total ({{ host_provision_lvm_total_gb }}G) exceeds available disk space
      ({{ host_provision_lvm_available_gb }}G = {{ host_provision_disk_size_gb }}G disk
      - {{ host_provision_reserved_disk_gb }}G reserved).
      Mounts: {{ host_provision_lvm_mounts | map(attribute='path') | list }}
    quiet: true

- name: "Provision boot environment via {{ host_provision_method }}"
  ansible.builtin.include_tasks: "{{ host_provision_method }}.yml"
