---
# PXE method: template per-MAC iPXE boot script + autoinstall config locally.
# Files are staged on the controller; provision_vm_vmware.yml pushes them
# to the PXE server via the export system before powering on the VM.
#
# Prerequisites:
#   - host_vm_mac fact must be set (by provision_vm_vmware.yml)
#   - Registry must contain: pxe_config_dir, pxe_assets_dir, pxe_base_url
#
# What we stage locally (under host_provision_pxe_staging_dir):
#   - menus/MAC-XXXXXXXXXXXX.ipxe — per-MAC iPXE script
#   - autoinstall/user-data — autoinstall config
#   - autoinstall/meta-data — empty (required by cloud-init)
#
# netboot.xyz v3 has built-in per-MAC boot: it tries MAC-{hexraw}.ipxe then
# MAC-{hexhyp}.ipxe before falling to the default menu.
#
# Parallel-safe: each host gets its own MAC-named file, no conflicts.

# 1. Ensure local staging directories exist
- name: "Ensure PXE staging directories for {{ inventory_hostname }}"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ host_provision_pxe_staging_dir }}/autoinstall"
    - "{{ host_provision_pxe_staging_dir }}/menus"

# 2. Template per-host autoinstall files
- name: "Template user-data for {{ inventory_hostname }}"
  ansible.builtin.template:
    src: "nocloud/user-data.j2"
    dest: "{{ host_provision_pxe_staging_dir }}/autoinstall/user-data"
    mode: "0644"

- name: "Template meta-data for {{ inventory_hostname }}"
  ansible.builtin.template:
    src: "nocloud/meta-data.j2"
    dest: "{{ host_provision_pxe_staging_dir }}/autoinstall/meta-data"
    mode: "0644"

# 3. Template per-MAC iPXE script
- name: "Template MAC-{{ host_vm_mac | replace(':', '') }}.ipxe for {{ inventory_hostname }}"
  ansible.builtin.template:
    src: "pxe/custom.ipxe.j2"
    dest: "{{ host_provision_pxe_staging_dir }}/menus/MAC-{{ host_vm_mac | replace(':', '') }}.ipxe"
    mode: "0644"
