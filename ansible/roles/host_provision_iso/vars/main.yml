---
# vars file for {{ role_name }}
host_provision_iso_os: "{{ host_provision_os }}" # I think this will work.
host_provision_iso_iso_dir: "{{ hostvars['controller'].provision.vars.iso_root }}"
host_provision_iso_ssh_pub_key_path: "{{ ansible_ssh_private_key_file }}.pub"
host_provision_iso_hostname: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"
host_provision_iso_networks: "{{ hostvars[inventory_hostname].provision.hardware.networks | default([]) }}"
host_provision_iso_dns_servers: "{{ hostvars[inventory_hostname].provision.hardware.dns.servers | default([]) }}"
host_provision_iso_proxy_protocol: "{{ ext_apt_proxy_protocol | default(host_provision_iso_proxy_protocol_default) }}"
host_provision_iso_proxy_host: "{{ ext_apt_proxy_host | default(host_provision_iso_proxy_host_default) }}"
host_provision_iso_proxy_port: "{{ ext_apt_proxy_port | default(host_provision_iso_proxy_port_default) }}"

# These are purposefully commented out. I want the app to fail if any of these are not initialized.

# host_provision_iso_file_name: "<DEFAULT>"
