# host_provision_iso_path: "<DEFAULT>"
# host_provision_iso_mode: "<DEFAULT>"
# host_provision_iso_checksum: "<DEFAULT>"
# host_provision_iso_tmp_dir: "<DEFAULT>"
# host_provision_iso_tmp_iso_dir: "<DEFAULT>"
# host_provision_iso_nocloud_dir: "<DEFAULT>"
# host_provision_iso_grub_dir: "<DEFAULT>"
# host_provision_iso_nocloud_metadata: "<DEFAULT>"
# host_provision_iso_nocloud_userdata: "<DEFAULT>"
# host_provision_iso_boot_grubcfg: "<DEFAULT>"
# host_provision_iso_custom_iso_name: "<DEFAULT>"
# host_provision_iso_custom_iso_path: "<DEFAULT>"
