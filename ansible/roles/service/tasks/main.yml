---
- name: "Create compose directory"
  ansible.builtin.file:
    path: "{{ service_dir }}"
    state: directory
    mode: "{{ service_dir_mode }}"

- name: "Pre-create bind mount directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: >-
    {{
      ((service_services | dict2items
        | selectattr('value.volumes', 'defined')
        | map(attribute='value.volumes')
        | flatten
        | map('regex_replace', ':.*$', '')
        | select('match', '/')
        | reject('match', '/var/run/')
        | reject('match', '/dev/')
        | reject('match', '/proc/')
        | reject('match', '/sys/')
        | list)
       + _infra_volume_paths)
      | unique
      | reject('in', _os_mount_paths)
      | list
    }}
  vars:
    _os_mount_paths: >-
      {{ (hostvars[inventory_hostname].provision.mounts | default([]))
         | map(attribute='path') | list }}
    _infra_volume_paths: >-
      {{ [service_infra_services.traefik.config.certs_volume | default('')]
         | select | list }}

- name: "Template docker-compose.yml"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ service_dir }}/docker-compose.yml"
    mode: "{{ service_file_mode }}"

- name: "Template traefik external routes config"
  when:
    - "'traefik' in service_infra_services"
    - "service_infra_services.traefik.config.external_routes is defined"
  ansible.builtin.template:
    src: traefik-external.yml.j2
    dest: "{{ service_dir }}/traefik-external.yml"
    mode: "{{ service_file_mode }}"

- name: "Deploy compose stack"
  community.docker.docker_compose_v2:
    project_src: "{{ service_dir }}"
    state: present
