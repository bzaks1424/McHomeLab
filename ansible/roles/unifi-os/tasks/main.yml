---
- name: "Check if UniFi OS Server is installed"
  ansible.builtin.command: "systemctl is-active {{ _unifi_os_service_name }}"
  register: _unifi_os_status
  changed_when: false
  failed_when: false

- name: "Install UniFi OS Server"
  when: _unifi_os_status.rc != 0
  block:
    - name: "Create installer directory"
      ansible.builtin.file:
        path: "{{ _unifi_os_installer_path | dirname }}"
        state: directory
        mode: "0755"

    - name: "Download UniFi OS Server installer"
      ansible.builtin.get_url:
        url: "{{ _unifi_os_version_url }}"
        dest: "{{ _unifi_os_installer_path }}"
        mode: "0755"

    - name: "Run UniFi OS Server installer"
      ansible.builtin.command: "{{ _unifi_os_installer_path }}"
      changed_when: true

- name: "Ensure UniFi OS Server is enabled and running"
  ansible.builtin.systemd:
    name: "{{ _unifi_os_service_name }}"
    state: started
    enabled: true
###############################################################################################################################################################
