---
###############################################################################
# site.yml — Merged-play structure with persistent registry
#
# Play 0: Initialize — build order + load/purge registry
# Play 1: Controller — configure + export vars to registry
# Play 2: Build      — each host serial:1, full V/P/I/C/E lifecycle
#
# Each host fully completes before the next starts.
# Priority field = dependency order (lower runs first).
###############################################################################

- name: "Initialize"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Sort hosts by priority"
      ansible.builtin.set_fact:
        build_hosts: >-
          {{ groups['all']
             | reject('equalto', 'controller')
             | map('extract', hostvars)
             | sort(attribute='priority')
             | map(attribute='inventory_hostname')
             | list }}

    - name: "Initialize registry"
      ansible.builtin.include_role:
        name: registry
        tasks_from: init

- name: "Configure Controller"
  hosts: controller
  gather_facts: false
  connection: local
  run_once: true
  become: true
  tasks:
    # --- Import from registry ---
    - name: "Import to controller"
      ansible.builtin.include_role:
        name: registry
        tasks_from: import

    # --- Configure controller ---
    - name: "Configure controller"
      ansible.builtin.include_role:
        name: controller

    # --- Export to registry ---
    - name: "Export from controller"
      ansible.builtin.include_role:
        name: registry
        tasks_from: export

- name: "Validate"
  hosts: "{{ hostvars['localhost'].build_hosts }}"
  serial: 1
  gather_facts: false
  become: true
  tasks:
    # --- Validate & Provision (local connection) ---
    - name: "Validate {{ inventory_hostname }}"
      ansible.builtin.include_role:
        name: host
        tasks_from: validate
      vars:
        ansible_connection: local
        site_role_action: validate

    - name: "The crowd goes wild! Now, get the facts."
      ansible.builtin.setup:

    # --- Import from registry ---
    - name: "Import to {{ inventory_hostname }}"
      ansible.builtin.include_role:
        name: registry
        tasks_from: import

    # --- Configure via BTF ---
    - name: "Configure {{ inventory_hostname }}"
      ansible.builtin.include_role:
        name: host
        tasks_from: configure
      vars:
        site_role_action: configure

    # --- Export to registry ---
    - name: "Export from {{ inventory_hostname }}"
      ansible.builtin.include_role:
        name: registry
        tasks_from: export
